<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snip — URL Shortener</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #7c6ff7;
      --accent-dim:#4e49a8;
      --text:      #e2e4ed;
      --muted:     #6b7080;
      --success:   #4ade80;
      --error:     #f87171;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 560px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .logo-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="url"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: var(--sans);
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="url"]:focus {
      border-color: var(--accent);
    }

    input[type="url"]::placeholder { color: var(--muted); }

    button.shorten-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    button.shorten-btn:hover  { background: var(--accent-dim); }
    button.shorten-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Result box */
    .result {
      margin-top: 1.5rem;
      display: none;
    }

    .result.visible { display: block; }

    .result-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .result-box {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
    }

    .result-slug {
      flex: 1;
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }

    .result-slug:hover { text-decoration: underline; }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 0.35rem 0.75rem;
      font-size: 0.78rem;
      font-family: var(--sans);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover { color: var(--text); border-color: var(--text); }
    .copy-btn.copied { color: var(--success); border-color: var(--success); }

    /* Error */
    .error-msg {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--error);
      display: none;
    }
    .error-msg.visible { display: block; }

    /* Stats row */
    .stats {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      display: none;
      gap: 1.5rem;
    }
    .stats.visible { display: flex; }

    .stat { font-size: 0.8rem; color: var(--muted); }
    .stat span { color: var(--text); font-weight: 500; }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">✂</div>
    <div>
      <div class="logo-text">Snip</div>
      <div class="logo-sub">Paste long. Get short.</div>
    </div>
  </div>

  <label for="url-input">Long URL</label>
  <div class="input-row">
    <input
      type="url"
      id="url-input"
      placeholder="https://example.com/very/long/url"
      autocomplete="off"
    />
    <button class="shorten-btn" id="shorten-btn" onclick="shorten()">Shorten</button>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="result" id="result">
    <div class="result-label">Your short link</div>
    <div class="result-box">
      <a class="result-slug" id="result-link" href="#" target="_blank"></a>
      <button class="copy-btn" id="copy-btn" onclick="copyLink()">Copy</button>
    </div>
  </div>

  <div class="stats" id="stats">
    <div class="stat">Slug &nbsp;<span id="stat-slug">—</span></div>
    <div class="stat">Original &nbsp;<span id="stat-original">—</span></div>
  </div>
</div>

<footer>Built with FastAPI + PostgreSQL &nbsp;·&nbsp; Himanshu Singh</footer>

<script>
  const API = '';   // same origin — FastAPI serves this file

  async function shorten() {
    const input   = document.getElementById('url-input');
    const btn     = document.getElementById('shorten-btn');
    const errorEl = document.getElementById('error-msg');
    const resultEl= document.getElementById('result');
    const statsEl = document.getElementById('stats');

    const url = input.value.trim();
    if (!url) { showError('Please enter a URL.'); return; }

    // reset UI
    hideError();
    resultEl.classList.remove('visible');
    statsEl.classList.remove('visible');
    btn.disabled = true;
    btn.textContent = 'Shortening…';

    try {
      const res  = await fetch(`${API}/shorten`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.detail || 'Something went wrong.');
        return;
      }

      const shortUrl = `${window.location.origin}/${data.slug}`;

      // populate result
      const linkEl = document.getElementById('result-link');
      linkEl.href        = shortUrl;
      linkEl.textContent = shortUrl;

      document.getElementById('stat-slug').textContent     = data.slug;
      document.getElementById('stat-original').textContent =
        data.original_url.length > 40
          ? data.original_url.slice(0, 40) + '…'
          : data.original_url;

      resultEl.classList.add('visible');
      statsEl.classList.add('visible');

      // reset copy button
      const copyBtn = document.getElementById('copy-btn');
      copyBtn.textContent = 'Copy';
      copyBtn.classList.remove('copied');

    } catch (err) {
      showError('Could not reach the server. Is it running?');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Shorten';
    }
  }

  function copyLink() {
    const link   = document.getElementById('result-link').href;
    const copyBtn= document.getElementById('copy-btn');
    navigator.clipboard.writeText(link).then(() => {
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'Copy';
        copyBtn.classList.remove('copied');
      }, 2000);
    });
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('error-msg').classList.remove('visible');
  }

  // Enter key support
  document.getElementById('url-input')
    .addEventListener('keydown', e => { if (e.key === 'Enter') shorten(); });
</script>

</body>
</html>
